services:
  # # Frontend development container
  a4s-webapp:
    build: ../a4s-webapp/
    ports:
      - "5173:80" # Development server port
    image: a4s-webapp:latest
    pull_policy: never
    container_name: a4s-webapp
    environment:
      APP_API_URL: ${API_URL_EXTERNAL}
      APP_SHOW_PLUGIN_VISUALIZATION: ${SHOW_PLUGIN_VISUALIZATION}
    depends_on:
      - a4s-backend
    networks:
      - frontend

  a4s-backend:
    build:
      context: .
    image: a4s-backend:latest
    pull_policy: never
    container_name: a4s-backend
    environment:
      S3_MODELS_BUCKET: ${S3_MODELS_BUCKET}
      S3_DATASETS_BUCKET: ${S3_DATASETS_BUCKET}
      S3_ARTIFACTS_BUCKET: ${S3_ARTIFACTS_BUCKET}
      S3_URL: ${S3_URL}
      S3_USER: ${S3_USER}
      S3_PASSWORD: ${S3_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      A4S_BACKEND_CORS_ALLOWED_ORIGINS: ${A4S_BACKEND_CORS_ALLOWED_ORIGINS}
      A4S_BACKEND_CSRF_TRUSTED_ORIGINS: ${A4S_BACKEND_CSRF_TRUSTED_ORIGINS}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ENABLE_SSL_PROXY: true
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      REDIS_BACKEND_URL: ${REDIS_BACKEND_URL}
      PLUGIN_PATH: ${PLUGIN_PATH}
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ${PLUGIN_PATH}:/app/plugins

  #
  a4s-eval-worker:
    platform: linux/amd64
    build:
      context: ../a4s-eval/
    image: a4s-eval:latest
    pull_policy: never
    container_name: a4s-eval-worker
    # volumes:
    #   - ./eval-logging.yaml:/app/config/logging.yaml:ro
    environment:
      API_URL: ${API_URL} # Address of api-backend
      REDIS_BACKEND_URL: ${REDIS_BACKEND_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CORS_ORIGINS: "*"
      PLUGIN_PATH: ${PLUGIN_PATH}
    depends_on:
      - a4s-backend
      - rabbitmq
      - redis
    networks:
      - backend
    volumes:
      - ${PLUGIN_PATH}:/app/plugins

  a4s-eval-flower:
    platform: linux/amd64
    image: a4s-eval:latest
    pull_policy: never
    container_name: a4s-eval-flower
    # volumes:
    #   - ./eval-logging.yaml:/app/config/logging.yaml:ro
    environment:
      API_URL: ${API_URL} # Address of api-backend
      REDIS_BACKEND_URL: ${REDIS_BACKEND_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CORS_ORIGINS: "*"
    ports:
      - "5555:5555"
    depends_on:
      - a4s-eval-worker
      - a4s-backend
      - rabbitmq
      - redis
    command: "celery -A a4s_eval.celery_worker flower"
    healthcheck:
      test:
        - "CMD-SHELL"
        - celery --app a4s_eval.celery_app inspect ping -d "celery@$$HOSTNAME"
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend
